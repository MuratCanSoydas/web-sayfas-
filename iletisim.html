</head>

                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5 mt-4" id="app">
        <div class="row justify-content-center">
            
            <div class="col-12 text-center mb-5">
                <h1 class="display-5 text-warning mb-3"><i class="fa-solid fa-paper-plane me-3"></i>İletişime Geçin</h1>
                <p class="lead">Görüş, öneri veya projeleriniz için aşağıdaki formu eksiksiz doldurunuz.</p>
            </div>

            <div class="col-md-8 col-lg-7">
                <div class="card p-4 p-md-5 bg-dark border-secondary shadow-lg">
                    
                    <form id="contactForm" action="gonder.php" method="POST">
                        
                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label class="form-label text-warning"><i class="fa-solid fa-user me-2"></i>Adınız Soyadınız</label>
                                <input type="text" name="ad" id="ad" class="form-control bg-transparent text-light border-secondary" v-model="form.ad" placeholder="Örn: Murat Can">
                            </div>
                            <div class="col-md-6 mb-4">
                                <label class="form-label text-warning"><i class="fa-solid fa-envelope me-2"></i>E-posta Adresi</label>
                                <input type="email" name="email" id="email" class="form-control bg-transparent text-light border-secondary" v-model="form.email" placeholder="mail@ornek.com">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label class="form-label text-warning"><i class="fa-solid fa-phone me-2"></i>Telefon No</label>
                                <input type="text" name="tel" id="tel" class="form-control bg-transparent text-light border-secondary" v-model="form.tel" placeholder="0555 123 4567">
                            </div>
                            <div class="col-md-6 mb-4">
                                <label class="form-label text-warning"><i class="fa-solid fa-layer-group me-2"></i>Konu</label>
                                <select name="konu" id="konu" class="form-select bg-dark text-light border-secondary" v-model="form.konu">
                                    <option value="" class="text-muted">Seçiniz...</option>
                                    <option value="Destek">Teknik Destek</option>
                                    <option value="Öneri">Proje Önerisi</option>
                                    <option value="İş Teklifi">İş Teklifi</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-warning"><i class="fa-solid fa-comment-dots me-2"></i>Mesajınız / Öneriniz</label>
                            <textarea name="mesaj" id="mesaj" class="form-control bg-transparent text-light border-secondary" rows="5" v-model="form.mesaj" placeholder="Düşüncelerinizi buraya detaylıca yazabilirsiniz..."></textarea>
                        </div>

                        <div class="mb-4 p-3 border border-secondary rounded bg-transparent">
                            <label class="form-label d-block text-warning mb-3"><i class="fa-solid fa-venus-mars me-2"></i>Cinsiyet</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="cinsiyet" value="Erkek" v-model="form.cinsiyet" id="erkek">
                                <label class="form-check-label text-light" for="erkek">Erkek</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="cinsiyet" value="Kadın" v-model="form.cinsiyet" id="kadin">
                                <label class="form-check-label text-light" for="kadin">Kadın</label>
                            </div>
                        </div>

                        <div class="mb-4 form-check">
                            <input type="checkbox" name="onay" id="onay" class="form-check-input border-warning" v-model="form.onay">
                            <label class="form-check-label text-light" for="onay">Kişisel verilerimin işlenmesini okudum ve <span class="text-warning">onaylıyorum.</span></label>
                        </div>

                        <div class="d-grid gap-3 d-md-flex justify-content-md-end mt-4">
                            <button type="reset" class="btn btn-outline-secondary px-4">Formu Temizle</button>
                            <button type="button" class="btn btn-outline-warning px-4" onclick="validateNative()">Native JS ile Gönder</button>
                            <button type="button" class="btn btn-warning px-4 fw-bold text-dark" @click="validateVue">
                                <i class="fa-brands fa-vuejs me-2"></i>Vue.js ile Gönder
                            </button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </main>

    <footer class="text-center py-4 mt-5 border-top border-secondary">

</body>
