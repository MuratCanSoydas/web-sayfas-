<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim | Proje</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Vue.js CDN (İkinci buton denetimi için) -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body class="bg-light">

    <!-- Menü (Navbar) -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Murat Can Soydaş</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Hakkında</a></li>
                    <li class="nav-item"><a class="nav-link" href="cv.html">Özgeçmiş</a></li>
                    <li class="nav-item"><a class="nav-link" href="sehir.html">Şehrim</a></li>
                    <li class="nav-item"><a class="nav-link" href="ilgi-alanlarim.html">İlgi Alanlarım (API)</a></li>
                    <li class="nav-item"><a class="nav-link" href="iletisim.html">İletişim</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html">Giriş</a></li>
                </ul>
            </div>
        </div>
    </nav>


    <main class="container mt-5" id="app">
        <div class="row justify-content-center">
            <div class="col-md-8 bg-white p-4 shadow rounded">
                <h2 class="mb-4">İletişim Formu</h2>
                
                <!-- Form Başlangıcı: Veriler gonder.php dosyasına gidecek -->
                <form id="contactForm" action="gonder.php" method="POST">
                    
                    <!-- Text Alanı -->
                    <div class="mb-3">
                        <label class="form-label">Adınız Soyadınız</label>
                        <input type="text" name="ad" id="ad" class="form-control" v-model="form.ad">
                    </div>

                    <!-- Email Alanı -->
                    <div class="mb-3">
                        <label class="form-label">E-posta Adresiniz</label>
                        <input type="email" name="email" id="email" class="form-control" v-model="form.email">
                    </div>

                    <!-- Telefon Alanı (Sadece rakam kontrolü yapılacak) -->
                    <div class="mb-3">
                        <label class="form-label">Telefon Numaranız</label>
                        <input type="text" name="tel" id="tel" class="form-control" v-model="form.tel">
                    </div>

                    <!-- Select (Seçim) Listesi -->
                    <div class="mb-3">
                        <label class="form-label">Konu</label>
                        <select name="konu" id="konu" class="form-select" v-model="form.konu">
                            <option value="">Seçiniz...</option>
                            <option value="Destek">Destek</option>
                            <option value="Öneri">Öneri</option>
                        </select>
                    </div>

                    <!-- Radio Button (Cinsiyet vb.) -->
                    <div class="mb-3">
                        <label class="form-label d-block">Cinsiyet</label>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="cinsiyet" value="Erkek" v-model="form.cinsiyet">
                            <label class="form-check-label">Erkek</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="cinsiyet" value="Kadın" v-model="form.cinsiyet">
                            <label class="form-check-label">Kadın</label>
                        </div>
                    </div>

                    <!-- Checkbox (Onay) -->
                    <div class="mb-3 form-check">
                        <input type="checkbox" name="onay" id="onay" class="form-check-input" v-model="form.onay">
                        <label class="form-check-label">Okudum, onaylıyorum.</label>
                    </div>

                    <!-- Butonlar: Proje kuralı gereği iki ayrı denetim -->
                    <div class="mt-4">
                        <button type="button" class="btn btn-primary" onclick="validateNative()">Native JS ile Gönder</button>
                        <button type="button" class="btn btn-success" @click="validateVue">Vue.js ile Gönder</button>
                        <button type="reset" class="btn btn-secondary">Temizle</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
