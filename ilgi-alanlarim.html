</head>
<body class="bg-dark text-light">

                <span class="navbar-toggler-icon"></span>

                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Hakkında</a></li>

    <!-- İçerik Alanı -->
    <main class="container mt-5">
        <!-- İçerik Alanı -->
    <main class="container mt-5">
        <h2 class="border-bottom pb-2 mb-4 text-warning">Dizi/Film Arama Motoru</h2>
        
        <!-- Arama Çubuğu Sistemi -->
        <div class="row mb-5 justify-content-center">
            <div class="col-md-8">
                <div class="input-group shadow">
                    <input type="text" id="searchInput" class="form-control form-control-lg bg-dark text-light border-secondary search-box" placeholder="Aranacak diziyi yazın (Örn: breaking bad, matrix)...">
                    <button class="btn btn-warning btn-lg px-4" type="button" onclick="searchShows()">Ara</button>
                </div>
            </div>
        </div>

        <!-- Yükleniyor Göstergesi -->
        <div id="loading" class="text-center mt-5 d-none">
            <div class="spinner-border text-warning" role="status">
                <span class="visually-hidden">Yükleniyor...</span>
            </div>
            <p class="mt-2 text-warning">API Sunucusuna Bağlanılıyor...</p>
        </div>

        <!-- Hata Mesajı Alanı -->
        <div id="error-message" class="alert alert-danger d-none" role="alert"></div>

        <!-- API Verilerinin Basılacağı Grid -->
        <div class="row" id="api-results"></div>
    </main>

    <!-- Asenkron Veri Çekme Motoru -->
    <script>
        // Sayfa yüklendiğinde boş ekran kalmaması için varsayılan bir arama atılır
        document.addEventListener("DOMContentLoaded", () => {
            fetchShows('vendetta');
        });

        // Tıklama ile arama
        function searchShows() {
            const query = document.getElementById('searchInput').value.trim();
            if(query === "") {
                alert("Hata: Arama alanı boş bırakılamaz.");
                return;
            }
            fetchShows(query);
        }

        // Enter tuşunu dinleyen event listener
        document.getElementById('searchInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                searchShows();
            }
        });

        async function fetchShows(query) {
            const resultsContainer = document.getElementById('api-results');
            const loadingIndicator = document.getElementById('loading');
            const errorIndicator = document.getElementById('error-message');

            // Arayüzü yeni sorgu öncesi sıfırla
            resultsContainer.innerHTML = '';
            errorIndicator.classList.add('d-none');
            loadingIndicator.classList.remove('d-none');

            try {
                // API isteğine dinamik değişken (query) eklendi
                const response = await fetch(`https://api.tvmaze.com/search/shows?q=${query}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP Hatası: ${response.status}`);
                }

                const data = await response.json();
                loadingIndicator.classList.add('d-none');

                if (data.length === 0) {
                    resultsContainer.innerHTML = `<div class="col-12 text-center mt-4"><h4 class="text-warning">"${query}" için sonuç bulunamadı.</h4></div>`;
                    return;
                }

                data.forEach(item => {
                    const show = item.show;
                    const imageUrl = show.image ? show.image.medium : 'https://via.placeholder.com/210x295?text=Gorsel+Yok';
                    const rating = show.rating.average ? show.rating.average : '-';
                    const summary = show.summary ? show.summary.substring(0, 110) + '...' : 'Özet bilgisi bulunmuyor.';

                    const cardHtml = `
                        <div class="col-md-3 mb-4">
                            <div class="card h-100 bg-dark border-secondary text-light">
                                <img src="${imageUrl}" class="card-img-top" alt="${show.name}">
                                <div class="card-body">
                                    <h5 class="card-title text-warning">${show.name}</h5>
                                    <h6 class="card-subtitle mb-3 text-muted">IMDb: ${rating}</h6>
                                    <p class="card-text" style="font-size: 0.85rem;">${summary}</p>
                                    <a href="${show.url}" target="_blank" class="btn btn-outline-warning btn-sm w-100">Detayları Gör</a>
                                </div>
                            </div>
                        </div>
                    `;
                    resultsContainer.innerHTML += cardHtml;
                });

            } catch (error) {
                loadingIndicator.classList.add('d-none');
                errorIndicator.classList.remove('d-none');
                errorIndicator.innerText = `Sistem Hatası: API sunucusu yanıt vermiyor. Detay: ${error.message}`;
            }
        }
    </script>
    </main>

    <!-- Asenkron Veri Çekme Motoru -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            fetchDystopianShows();
        });

        async function fetchDystopianShows() {
            const resultsContainer = document.getElementById('api-results');
            const loadingIndicator = document.getElementById('loading');
            const errorIndicator = document.getElementById('error-message');

            try {
                // TVMaze API'sine GET isteği atılıyor
                const response = await fetch('https://api.tvmaze.com/search/shows?q=vendetta');
                
                // HTTP durum kodu kontrolü (200 OK değilse hata fırlat)
                if (!response.ok) {
                    throw new Error(`HTTP Hatası: ${response.status}`);
                }

                // Gelen JSON verisini parse etme
                const data = await response.json();
                
                // Yükleniyor ikonunu gizle
                loadingIndicator.classList.add('d-none');

                // Veri boş gelirse eksiklik kontrolü
                if (data.length === 0) {
                    resultsContainer.innerHTML = '<p class="text-warning">Aranan kriterde yapım bulunamadı.</p>';
                    return;
                }

                // JSON içindeki diziyi dönüp HTML elementleri oluşturma
                data.forEach(item => {
                    const show = item.show;
                    
                    // API'de bazı yapımların resmi veya özeti olmayabilir. Null pointer hatasını engellemek için ternary if kullanıldı.
                    const imageUrl = show.image ? show.image.medium : 'https://via.placeholder.com/210x295?text=Gorsel+Yok';
                    const rating = show.rating.average ? show.rating.average : 'Bilinmiyor';
                    const summary = show.summary ? show.summary.substring(0, 100) + '...' : 'Özet bilgisi bulunmuyor.';

                    // Bootstrap Card yapısı ile ekrana basma
                    const cardHtml = `
                        <div class="col-md-3 mb-4">
                            <div class="card h-100 bg-dark border-secondary text-light">
                                <img src="${imageUrl}" class="card-img-top" alt="${show.name}">
                                <div class="card-body">
                                    <h5 class="card-title text-warning">${show.name}</h5>
                                    <h6 class="card-subtitle mb-2 text-muted">Puan: ${rating}</h6>
                                    <p class="card-text" style="font-size: 0.85rem;">${summary}</p>
                                </div>
                                <div class="card-footer border-secondary">
                                    <a href="${show.url}" target="_blank" class="btn btn-outline-warning btn-sm w-100">Detayları Gör</a>
                                </div>
                            </div>
                        </div>
                    `;
                    resultsContainer.innerHTML += cardHtml;
                });

            } catch (error) {
                // Ağ kopması veya hatalı JSON durumunda sistemi koruma
                console.error("API Hatası:", error);
                loadingIndicator.classList.add('d-none');
                errorIndicator.classList.remove('d-none');
                errorIndicator.innerText = `Bağlantı hatası: ${error.message}`;
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
