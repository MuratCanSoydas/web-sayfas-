<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İlgi Alanlarım | API Entegrasyonu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-light">

    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="index.html">Murat Can Soydaş</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#anaMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="anaMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Hakkında</a></li>
                    <li class="nav-item"><a class="nav-link" href="cv.html">Özgeçmiş</a></li>
                    <li class="nav-item"><a class="nav-link" href="sehir.html">Şehrim</a></li>
                    <li class="nav-item"><a class="nav-link active" href="ilgi-alanlarim.html">İlgi Alanlarım (API)</a></li>
                    <li class="nav-item"><a class="nav-link" href="iletisim.html">İletişim</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html">Giriş</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5 mt-4">
        
        <div class="text-center mb-5">
            <h1 class="display-5 text-warning mb-3"><i class="fa-solid fa-film me-3"></i>Dizi/Film Keşif Motoru</h1>
            <p class="lead">TVMaze veritabanı kullanılarak dinamik olarak veri çekilen API sistemidir.</p>
        </div>
        
        <div class="row mb-5 justify-content-center">
            <div class="col-md-8">
                <div class="input-group shadow-lg rounded">
                    <input type="text" id="searchInput" class="form-control form-control-lg bg-dark text-light border-warning" placeholder="Aranacak diziyi yazın (Örn: breaking bad)...">
                    <button class="btn btn-warning btn-lg px-4" type="button" onclick="searchShows()">
                        <i class="fa-solid fa-magnifying-glass me-2"></i>Ara
                    </button>
                </div>
            </div>
        </div>

        <div id="loading" class="text-center mt-5 d-none">
            <div class="spinner-border text-warning" role="status">
                <span class="visually-hidden">Yükleniyor...</span>
            </div>
            <p class="mt-2 text-warning font-monospace">API Sunucusuna Bağlanılıyor...</p>
        </div>

        <div id="error-message" class="alert alert-danger d-none shadow" role="alert"></div>

        <div class="row" id="api-results"></div>
    </main>

    <footer class="text-center py-4 mt-5">
        <p class="mb-0 text-muted">&copy; 2026 Murat Can Soydaş - Sakarya Üniversitesi</p>
    </footer>

    <script>
        // Sayfa yüklendiğinde varsayılan arama
        document.addEventListener("DOMContentLoaded", () => {
            fetchShows('vikings'); // Açılışta Vikings dizisini arar
        });

        // Butonla arama
        function searchShows() {
            const query = document.getElementById('searchInput').value.trim();
            if(query === "") {
                alert("Hata: Arama alanı boş bırakılamaz.");
                return;
            }
            fetchShows(query);
        }

        // Enter tuşuyla arama
        document.getElementById('searchInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                searchShows();
            }
        });

        async function fetchShows(query) {
            const resultsContainer = document.getElementById('api-results');
            const loadingIndicator = document.getElementById('loading');
            const errorIndicator = document.getElementById('error-message');

            resultsContainer.innerHTML = '';
            errorIndicator.classList.add('d-none');
            loadingIndicator.classList.remove('d-none');

            try {
                const response = await fetch(`https://api.tvmaze.com/search/shows?q=${query}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP Hatası: ${response.status}`);
                }

                const data = await response.json();
                loadingIndicator.classList.add('d-none');

                if (data.length === 0) {
                    resultsContainer.innerHTML = `<div class="col-12 text-center mt-4"><h4 class="text-warning">"${query}" için sonuç bulunamadı.</h4></div>`;
                    return;
                }

                data.forEach(item => {
                    const show = item.show;
                    const imageUrl = show.image ? show.image.medium : 'https://via.placeholder.com/210x295?text=Gorsel+Yok';
                    const rating = show.rating.average ? show.rating.average : '-';
                    const summary = show.summary ? show.summary.substring(0, 110) + '...' : 'Özet bilgisi bulunmuyor.';

                    // Premium Card Yapısı (style.css'den destek alır)
                    const cardHtml = `
                        <div class="col-md-3 mb-4">
                            <div class="card h-100 bg-dark border-secondary text-light">
                                <img src="${imageUrl}" class="card-img-top" alt="${show.name}">
                                <div class="card-body d-flex flex-column">
                                    <h5 class="card-title text-warning">${show.name}</h5>
                                    <h6 class="card-subtitle mb-3 text-muted"><i class="fa-solid fa-star text-warning me-1"></i>IMDb: ${rating}</h6>
                                    <p class="card-text" style="font-size: 0.85rem;">${summary}</p>
                                    <a href="${show.url}" target="_blank" class="btn btn-outline-warning btn-sm w-100 mt-auto">Detayları Gör</a>
                                </div>
                            </div>
                        </div>
                    `;
                    resultsContainer.innerHTML += cardHtml;
                });

            } catch (error) {
                loadingIndicator.classList.add('d-none');
                errorIndicator.classList.remove('d-none');
                errorIndicator.innerText = `Sistem Hatası: API sunucusu yanıt vermiyor. Detay: ${error.message}`;
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
