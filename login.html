<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Öğrenci Giriş Sistemi | Murat Can Soydaş</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Login Sayfasına Özel Estetik Ayarlar */
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: scale(1.02);
        }

        .login-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .login-header h2 {
            color: #fbbf24; /* Amber rengi */
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .form-label {
            color: #e2e8f0;
            font-size: 0.85rem;
            margin-left: 5px;
        }

        .input-group-text {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fbbf24;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff !important;
            padding: 12px;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #fbbf24;
            box-shadow: 0 0 10px rgba(251, 191, 36, 0.3);
        }

        .btn-login {
            background: #fbbf24;
            border: none;
            color: #0f172a;
            font-weight: 600;
            padding: 12px;
            border-radius: 10px;
            margin-top: 20px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-login:hover {
            background: #f59e0b;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(251, 191, 36, 0.4);
        }

        /* Alt Linkler */
        .login-footer {
            text-align: center;
            margin-top: 25px;
        }

        .login-footer a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.8rem;
            transition: color 0.3s;
        }

        .login-footer a:hover {
            color: #fbbf24;
        }

    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <i class="fa-solid fa-graduation-cap fa-3x mb-3 text-warning"></i>
            <h2>Öğrenci Portalı</h2>
            <p>Site Giriş</p>
        </div>

        <form action="login.php" method="POST">
            <div class="mb-4">
                <label class="form-label">Öğrenci Maili</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
                    <input type="email" name="user_email" class="form-control" placeholder="b241... @ogr.sakarya.edu.tr" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Şifre (Öğrenci No)</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" name="user_pass" class="form-control" placeholder="Öğrenci numaranız" required>
                </div>
            </div>

            <button type="submit" class="btn btn-login w-100">Güvenli Giriş Yap</button>
        </form>

        <div class="login-footer">
            <a href="index.html"><i class="fa-solid fa-arrow-left me-2"></i>Ana Sayfaya Dön</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
