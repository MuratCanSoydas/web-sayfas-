<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Öğrenci Giriş Sistemi | Murat Can Soydaş</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Login Sayfasına Özel Estetik Ayarlar */
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: scale(1.02);
        }

        .login-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .login-header h2 {
            color: #fbbf24; /* Amber rengi */
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .form-label {
            color: #e2e8f0;
            font-size: 0.85rem;
            margin-left: 5px;
        }

        .input-group-text {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fbbf24;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff !important;
            padding: 12px;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #fbbf24;
            box-shadow: 0 0 10px rgba(251, 191, 36, 0.3);
        }

        .btn-login {
            background: #fbbf24;
            border: none;
            color: #0f172a;
            font-weight: 600;
            padding: 12px;
            border-radius: 10px;
            margin-top: 20px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-login:hover {
            background: #f59e0b;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(251, 191, 36, 0.4);
        }

        /* Alt Linkler */
        .login-footer {
            text-align: center;
            margin-top: 25px;
        }

        .login-footer a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.8rem;
            transition: color 0.3s;
        }

        .login-footer a:hover {
            color: #fbbf24;
        }

    </style>
</head>
<body>

    <div class="login-card"> <!-- Giriş formunu içeren kart. "login-card" sınıfı, bu div'in özel stilini tanımlar. -->
        <div class="login-header"> <!-- Giriş formunun başlık bölümünü içeren div. "login-header" sınıfı, bu bölümün özel stilini tanımlar. -->
            <i class="fa-solid fa-graduation-cap fa-3x mb-3 text-warning"></i> <!-- Başlık simgesi. "fa-solid fa-graduation-cap" sınıfları, Font Awesome'dan bir mezuniyet kepi simgesi ekler. "fa-3x" sınıfı, simgenin boyutunu 3 katına çıkarır. "mb-3" sınıfı, simgenin altına boşluk ekler. "text-warning" sınıfı, simgeyi uyarı renginde yapar. -->
            <h2>Öğrenci Portalı</h2>
            <p>Site Giriş</p>
        </div>

        <form action="login.php" method="POST"> <!-- Giriş formu. "action" özniteliği, formun gönderildiğinde verilerin hangi URL'ye gönderileceğini belirtir. "method" özniteliği, form verilerinin nasıl gönderileceğini belirtir; burada POST yöntemi kullanılır, bu da verilerin HTTP isteğinin gövdesinde gönderileceği anlamına gelir. -->
            <div class="mb-4"> <!-- Form alanlarını içeren div. "mb-4" sınıfı, bu div'in altına 4 birimlik boşluk ekler. -->
                <label class="form-label">Öğrenci Maili</label> <!-- Form alanının etiketi. "form-label" sınıfı, bu etiketin özel stilini tanımlar. -->
                <div class="input-group"> <!-- Giriş alanını ve simgeyi içeren grup. "input-group" sınıfı, bu div'in bir giriş grubu olduğunu belirtir ve içindeki öğeleri yan yana düzenler. -->
                    <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span> <!-- Giriş alanının başında gösterilecek simge. "input-group-text" sınıfı, bu span'ın giriş alanının bir parçası olduğunu belirtir. İçindeki "fa-solid fa-envelope" sınıfları, Font Awesome'dan bir zarf simgesi ekler. -->
                    <input type="email" name="user_email" class="form-control" placeholder="b241... @ogr.sakarya.edu.tr" required> <!-- E-posta giriş alanı. "type='email'" özniteliği, bu input'un e-posta formatında veri girişi beklediğini belirtir. "name" özniteliği, form verileri gönderildiğinde bu alanın adını belirtir. "class='form-control'" sınıfı, Bootstrap'ın form kontrolü stilini uygular. "placeholder" özniteliği, kullanıcıya bu alana ne tür bilgi girmesi gerektiğini gösteren bir ipucu sağlar. "required" özniteliği, bu alanın doldurulmasının zorunlu olduğunu belirtir. -->
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Şifre (Öğrenci No)</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" name="user_pass" class="form-control" placeholder="Öğrenci numaranız" required>
                </div>
            </div>

            <button type="submit" class="btn btn-login w-100">Güvenli Giriş Yap</button> <!-- Giriş butonu. "type='submit'" özniteliği, bu butonun formu göndermek için kullanılacağını belirtir. "class='btn btn-login w-100'" sınıfları, bu butona Bootstrap'ın buton stilini uygular ve "btn-login" sınıfı ile özel stil ekler. "w-100" sınıfı, butonun genişliğini %100 yaparak formun tamamını kaplamasını sağlar. -->
        </form>

        <div class="login-footer">
            <a href="index.html"><i class="fa-solid fa-arrow-left me-2"></i>Ana Sayfaya Dön</a> <!-- Ana sayfaya dönüş bağlantısı. "login-footer" sınıfı, bu bölümün özel stilini tanımlar. "fa-solid fa-arrow-left" sınıfları, Font Awesome'dan bir sol ok simgesi ekler. "me-2" sınıfı, simgenin sağ tarafına boşluk ekler. -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
